app = 'kindo-agent-tracker'
primary_region = 'dfw'

[build]

[env]
  PORT = '3000'
  NODE_ENV = 'production'
  DB_PATH = '/data/kindo-tracker.db'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = 'kindo_data'
  destination = '/data'
